# ─────────────────────────────────────────────────────────────────────────────
# EmemediaForge — GitHub Release pipeline
#
# Trigger:
#   git tag v1.0.1 && git push origin v1.0.1 --force
#
# What it does:
#   1. Runs the full test suite  (must pass — blocks everything else)
#   2. Builds a wheel + source tarball
#   3. Creates a GitHub Release with:
#      - Auto-generated changelog from commits
#      - .whl attached  → users can pip install directly from the URL
#      - .tar.gz attached → raw source download
#
# NO PyPI. NO secrets. Just git tag + push.
# ─────────────────────────────────────────────────────────────────────────────
name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"       # v1.0.0  stable
      - "v[0-9]+.[0-9]+.[0-9]+-*"     # v1.0.0-beta.1  pre-release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── 1. Tests must pass ─────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── 2. Build wheel + tarball ────────────────────────────────────────────────
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0     # full history for changelog

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Sync version from git tag → pyproject.toml
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Version: $VERSION"
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml

      - name: Build wheel + sdist
        run: |
          pip install build
          python -m build
          ls -lh dist/

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── 3. GitHub Release with changelog + assets ───────────────────────────────
  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Generate changelog
        id: changelog
        run: |
          # Get all commits since last tag
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" | head -30)
          else
            COMMITS=$(git log ${PREV}..HEAD --pretty=format:"- %s (%h)")
          fi

          # Split into categories by conventional commit prefix
          FEAT=$(echo "$COMMITS"  | grep -E "^- feat"   | sed 's/^- feat[:(]/- ✨ /' || true)
          FIX=$(echo "$COMMITS"   | grep -E "^- fix"    | sed 's/^- fix[:(]/- 🐛 /'  || true)
          DOCS=$(echo "$COMMITS"  | grep -E "^- docs"   | sed 's/^- docs[:(]/- 📚 /' || true)
          PERF=$(echo "$COMMITS"  | grep -E "^- perf"   | sed 's/^- perf[:(]/- ⚡ /' || true)
          OTHER=$(echo "$COMMITS" | grep -vE "^- (feat|fix|docs|perf|chore|ci|test|style|refactor)" || true)

          VERSION="${GITHUB_REF_NAME#v}"
          WHEEL=$(ls dist/*.whl | head -1 | xargs basename)
          TARBALL=$(ls dist/*.tar.gz | head -1 | xargs basename)
          REPO="${{ github.repository }}"

          NOTES="## Install\n\n"
          NOTES+="**Option 1 — pip direct from this release** (no git required):\n"
          NOTES+="\`\`\`bash\n"
          NOTES+="pip install https://github.com/${REPO}/releases/download/${GITHUB_REF_NAME}/${WHEEL}\n"
          NOTES+="\`\`\`\n\n"
          NOTES+="**Option 2 — git clone** (recommended for development):\n"
          NOTES+="\`\`\`bash\n"
          NOTES+="git clone https://github.com/${REPO}.git\n"
          NOTES+="cd ememediaforge\n"
          NOTES+="pip install .\n"
          NOTES+="\`\`\`\n\n"
          NOTES+="**Option 3 — pip from git tag**:\n"
          NOTES+="\`\`\`bash\n"
          NOTES+="pip install git+https://github.com/${REPO}.git@${GITHUB_REF_NAME}\n"
          NOTES+="\`\`\`\n\n"
          NOTES+="---\n\n## What's Changed\n\n"
          [ -n "$FEAT"  ] && NOTES+="### ✨ New Features\n${FEAT}\n\n"
          [ -n "$FIX"   ] && NOTES+="### 🐛 Bug Fixes\n${FIX}\n\n"
          [ -n "$DOCS"  ] && NOTES+="### 📚 Documentation\n${DOCS}\n\n"
          [ -n "$PERF"  ] && NOTES+="### ⚡ Performance\n${PERF}\n\n"
          [ -n "$OTHER" ] && NOTES+="### 🔧 Other\n${OTHER}\n\n"
          [ -z "$FEAT$FIX$DOCS$PERF$OTHER" ] && NOTES+="Initial release.\n\n"
          NOTES+="---\n"
          NOTES+="Built by [@Ememzyvisuals](https://github.com/Ememzyvisuals) · Axiveri"

          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo -e "$NOTES"  >> $GITHUB_OUTPUT
          echo "EOF"        >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "EmemediaForge ${{ github.ref_name }}"
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/*.whl
            dist/*.tar.gz
